seed: 42

model:
  name: baseline_cnn
  pretrained: true
  adapt_for_small_inputs: true

dataset:
  name: pathmnist
  train_fraction: 1.0

paths:
  data_dir: ./data
  results_dir: ./experiments/results
  checkpoints_dir: ./experiments/results/checkpoints

training:
  batch_size: 64
  num_workers: 0
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 7
  optimizer:
    name: adam
    momentum: 0.9
    adam_beta1: 0.9
    adam_beta2: 0.999
  scheduler:
    name: cosine
    step_size: 10
    gamma: 0.1
    min_lr: 0.000001
  logit_temperature:
    start: 1.0
    end: 1.0

libs:
  use_sobel: true
  use_fusion: true
  sobel_mode: magnitude
  raw_use_conv: false

experiments:
  datasets: [pathmnist, bloodmnist]
  run_models: [baseline_cnn, densenet121, libs_cnn, libs_densenet121]
  seeds: [13, 42, 101, 202, 777]
  skip_completed: false
